<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html
    DirectoryIndex index.php index.html

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined

    IncludeOptional conf-enabled/local-sites-allow.conf

    RewriteEngine On
    RewriteCond %{QUERY_STRING} ^$
    RewriteCond %{ENV:ADMINER_DB} !^$
    RewriteCond %{HTTP:X-Forwarded-Proto} =https
    RewriteRule ^/adminer/?$ https://%{HTTP_HOST}/adminer/?server=%{ENV:ADMINER_SERVER}&username=%{ENV:ADMINER_USER}&db=%{ENV:ADMINER_DB} [R=302,L,NE]

    RewriteCond %{QUERY_STRING} ^$
    RewriteCond %{ENV:ADMINER_DB} !^$
    RewriteRule ^/adminer/?$ /adminer/?server=%{ENV:ADMINER_SERVER}&username=%{ENV:ADMINER_USER}&db=%{ENV:ADMINER_DB} [R=302,L,NE]

    <Directory /var/www/html>
        AllowOverride None
        Require all granted
        Options FollowSymLinks

        RewriteEngine On
        RewriteCond %{REQUEST_URI} !^/adminer(/|$)
        RewriteCond %{ENV:ALLOWED_SITE} !=1
        RewriteRule ^ - [R=404,L]

        RewriteBase /
        RewriteRule ^index\.php$ - [L]
        RewriteCond %{REQUEST_FILENAME} -f [OR]
        RewriteCond %{REQUEST_FILENAME} -d
        RewriteRule ^ - [L]
        RewriteRule . /index.php [L]
    </Directory>

    <Directory /var/www/html/adminer>
        AllowOverride None
        Require all granted
        DirectoryIndex index.php
    </Directory>
</VirtualHost>
