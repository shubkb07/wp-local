<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html
    DirectoryIndex index.php index.html
    LimitRequestBody 1073741824

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined

    IncludeOptional conf-enabled/local-sites-allow.conf
    ProxyPreserveHost On

    RewriteEngine On
    RewriteRule ^/mailpit$ /mailpit/ [R=302,L]

    RewriteCond %{QUERY_STRING} ^$
    RewriteCond %{ENV:ADMINER_DB} !^$
    RewriteCond %{HTTP:X-Forwarded-Proto} =https
    RewriteRule ^/adminer/?$ https://%{HTTP_HOST}/adminer/?server=%{ENV:ADMINER_SERVER}&username=%{ENV:ADMINER_USER}&db=%{ENV:ADMINER_DB} [R=302,L,NE]

    RewriteCond %{QUERY_STRING} ^$
    RewriteCond %{ENV:ADMINER_DB} !^$
    RewriteRule ^/adminer/?$ /adminer/?server=%{ENV:ADMINER_SERVER}&username=%{ENV:ADMINER_USER}&db=%{ENV:ADMINER_DB} [R=302,L,NE]

    <Directory /var/www/html>
        AllowOverride None
        Require all granted
        Options FollowSymLinks
        LimitRequestBody 1073741824

        RewriteEngine On
        RewriteCond %{REQUEST_URI} !^/(adminer|mailpit)(/|$)
        RewriteCond %{ENV:ALLOWED_SITE} !=1
        RewriteRule ^ - [R=404,L]

        RewriteBase /
        RewriteRule ^index\.php$ - [L]
        RewriteCond %{REQUEST_FILENAME} -f [OR]
        RewriteCond %{REQUEST_FILENAME} -d
        RewriteRule ^ - [L]
        RewriteRule . /index.php [L]
    </Directory>

    <Directory /var/www/html/adminer>
        AllowOverride None
        Require all granted
        DirectoryIndex index.php
        LimitRequestBody 1073741824
    </Directory>

    ProxyPass /mailpit/ http://127.0.0.1:8025/mailpit/
    ProxyPassReverse /mailpit/ http://127.0.0.1:8025/mailpit/
</VirtualHost>
